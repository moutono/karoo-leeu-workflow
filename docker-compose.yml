version: '3.8'

services:
  n8n:
    build: .
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Africa/Johannesburg
      # Enables node_modules in the Code Node
      - NODE_FUNCTION_ALLOW_EXTERNAL=puppeteer
    volumes:
      - ./.n8n:/home/node/.n8n
